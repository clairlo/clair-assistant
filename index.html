<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f5fc;--surface:#fff;--border:#d8e4f4;
  --text:#3a3a52;--text2:#7070a0;--text3:#aab0cc;
  --blue:#7ab0e0;--blue-soft:#daeaf8;--blue-mid:#a8cce8;
  --lav:#b0a0d4;--lav-soft:#ece6f8;
  --sand:#e4ecf8;--red:#e07880;--amber:#e8c060;--green:#88c0a4;
}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:520px;min-height:100vh;display:flex;flex-direction:column}
.bg-dots{position:fixed;top:0;left:50%;transform:translateX(-50%);width:520px;height:100vh;background-image:radial-gradient(circle,rgba(122,176,224,0.06) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0}

.header{position:relative;z-index:1;padding:18px 16px 0;display:flex;align-items:center;gap:10px}
.avatar{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#c4daf0,#7ab0e0);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 14px rgba(122,176,224,0.28);flex-shrink:0}
.header-name{font-weight:700;font-size:15px;white-space:nowrap}
.header-date{font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap}
.chips{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
.chip{border-radius:20px;padding:5px 11px;font-size:12px;font-weight:700;white-space:nowrap}
.chip-t{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(122,176,224,0.4)}
.chip-e{background:var(--lav);color:#fff;box-shadow:0 2px 8px rgba(176,160,212,0.4)}

.tabs{position:relative;z-index:1;display:flex;margin:16px 16px 0;background:var(--sand);border-radius:14px;padding:4px;gap:3px}
.tab{flex:1;padding:9px 0;border:none;border-radius:11px;background:transparent;color:var(--text3);font-weight:500;font-size:12.5px;cursor:pointer;transition:all .22s;font-family:inherit}
.tab.active{background:var(--surface);color:var(--blue);font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.07)}

.content{position:relative;z-index:1;flex:1;overflow:hidden;display:flex;flex-direction:column;padding:14px 0 0}
.panel{flex:1;overflow-y:auto;padding:0 16px 20px;display:flex;flex-direction:column}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:var(--blue-mid);border-radius:3px}

/* Uncat banner */
.uncat-banner{background:#fff8e8;border:1.5px solid #e8c060;border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:12.5px;color:#7a6020}
.uncat-banner strong{font-weight:700}

/* Todo add area */
.todo-add-area{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:13px 14px;margin-bottom:16px}
.qadd{display:flex;gap:8px;margin-bottom:10px}
.qadd input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit;transition:border-color .2s}
.qadd input:focus{border-color:var(--blue-mid)}
.qadd input::placeholder{color:var(--text3)}
.qadd-row2{display:flex;gap:6px;align-items:center}
.cat-opts-inline{display:flex;gap:6px;flex:1;flex-wrap:wrap}
.todo-cat-btn{border:1.5px solid var(--border);border-radius:20px;padding:5px 11px;font-size:11.5px;cursor:pointer;background:var(--surface);font-family:inherit;color:var(--text2);transition:all .15s}
.todo-cat-btn.work.sel{background:#daeaf8;border-color:var(--blue);color:#3a6090;font-weight:600}
.todo-cat-btn.tjm.sel{background:#ece6f8;border-color:var(--lav);color:#6050a0;font-weight:600}
.todo-cat-btn.other.sel{background:#e4ecf8;border-color:#90a8c8;color:#506080;font-weight:600}
.todo-cat-btn.none.sel{background:#fff8e8;border-color:#e8c060;color:#7a6020;font-weight:600}
.pri-sel{display:flex;gap:5px}
.pri-btn{border:1.5px solid var(--border);border-radius:10px;padding:5px 9px;font-size:12px;cursor:pointer;background:var(--surface);font-family:inherit;color:var(--text2)}
.pri-btn.sel{font-weight:700;color:#fff}
.pri-btn.high.sel{background:#e07880;border-color:#e07880}
.pri-btn.medium.sel{background:#e8c060;border-color:#e8c060;color:var(--text)}
.pri-btn.low.sel{background:#88c0a4;border-color:#88c0a4}
.add-todo-btn{width:100%;margin-top:10px;padding:9px;border-radius:10px;background:linear-gradient(135deg,#c4daf0,#7ab0e0);border:none;color:var(--text);font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(122,176,224,0.25)}

/* Todo sections */
.todo-section{margin-bottom:18px}
.todo-sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.todo-sec-title{font-size:12px;font-weight:700;letter-spacing:.5px}
.todo-sec-count{background:var(--sand);border-radius:20px;padding:1px 8px;font-size:11px;color:var(--text3);font-weight:600}
/* 3-column grid per priority */
.todo-col-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.todo-col{min-width:0}
.todo-col-hdr{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:6px;text-align:center;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.todo-card{display:flex;flex-direction:column;gap:5px;padding:8px 9px;margin-bottom:6px;background:var(--surface);border-radius:12px;border:1.5px solid var(--border);cursor:default}
.todo-card-top{display:flex;align-items:flex-start;gap:6px}
.todo-check{width:18px;height:18px;border-radius:6px;border:2px solid;background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px}
.todo-title{font-size:12px;color:var(--text);line-height:1.4;flex:1;min-width:0;word-break:break-all}
.todo-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:0;line-height:1;flex-shrink:0}
.todo-del:hover{color:var(--red)}
.todo-date{font-size:10px;color:var(--text3)}
.overdue{color:var(--red);font-size:10px;font-weight:700}
.todo-col-empty{font-size:11px;color:var(--text3);text-align:center;padding:10px 4px;opacity:.6}
.badge{border-radius:20px;padding:1px 7px;font-size:10px;font-weight:600}
.badge-work{background:#daeaf8;color:#3a6090}
.badge-tjm{background:#ece6f8;color:#6050a0}
.badge-other{background:#e4ecf8;color:#506080}
.badge-none{background:#fff8e8;color:#7a6020}
.badge-high{background:#fde8e8;color:#b05060}
.badge-medium{background:#fdf5dc;color:#906020}
.badge-low{background:#e0f2e8;color:#3a7050}
.overdue{color:var(--red);font-size:10px;font-weight:700}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:19px;padding:0;line-height:1;flex-shrink:0}
.del-btn:hover{color:var(--red)}
.done-sec summary{font-size:12px;color:var(--text3);cursor:pointer;padding:6px 0}
.done-item{display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:5px;background:var(--surface);border-radius:10px;opacity:.4}
.done-title{flex:1;font-size:13px;text-decoration:line-through;color:var(--text2)}
.empty{text-align:center;color:var(--text3);margin-top:32px;font-size:13px;line-height:2.2}

/* Filter tabs for todos */
.todo-filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tfilter{border:1.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11.5px;cursor:pointer;background:var(--surface);font-family:inherit;color:var(--text2)}
.tfilter.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}

/* Calendar */
.ev-form{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:14px;margin-bottom:14px}
.form-lbl{font-size:11.5px;font-weight:700;color:var(--blue);letter-spacing:.8px;margin-bottom:10px}
.finp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit;margin-bottom:8px;transition:border-color .2s}
.finp:focus{border-color:var(--blue-mid)}
.finp::placeholder{color:var(--text3)}
.frow{display:flex;gap:8px;margin-bottom:8px}
.frow .finp{margin-bottom:0}
.ftime{width:90px;flex-shrink:0}
.add-btn{width:100%;padding:10px;border-radius:10px;background:linear-gradient(135deg,#c4daf0,#7ab0e0);border:none;color:var(--text);font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;box-shadow:0 2px 10px rgba(122,176,224,0.25)}
.form-sublbl{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:600;letter-spacing:.5px}
.cat-sel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.cat-opt{border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;background:var(--surface);font-family:inherit;color:var(--text2)}
.cat-opt.work.selected{background:#daeaf8;border-color:var(--blue);color:#3a6090;font-weight:600}
.cat-opt.personal.selected{background:#ece6f8;border-color:var(--lav);color:#6050a0;font-weight:600}
.cat-opt.other.selected{background:#e4ecf8;border-color:#90a8c8;color:#506080;font-weight:600}
.remind-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.remind-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue)}
.remind-row label{font-size:12px;color:var(--text2);cursor:pointer}
.remind-row select{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:3px 8px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filter-btn{border:1.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11.5px;cursor:pointer;background:var(--surface);font-family:inherit;color:var(--text2)}
.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}
.sec-ttl{font-size:11.5px;font-weight:700;margin-bottom:9px}
.ev-card{display:flex;gap:12px;padding:11px 13px;margin-bottom:8px;background:var(--surface);border-radius:14px;border:1.5px solid var(--border)}
.ev-card.today{background:var(--blue-soft);border-color:rgba(122,176,224,0.4)}
.ev-card.past{opacity:.4}
.ev-date{text-align:center;min-width:40px}
.ev-day{font-size:18px;font-weight:700;line-height:1}
.ev-wd{font-size:10px;color:var(--text3);margin-top:2px}
.ev-info{flex:1;min-width:0}
.ev-title{font-size:13.5px;font-weight:600}
.cat-tag{display:inline-block;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600;margin-top:3px}
.cat-work{background:#daeaf8;color:#3a6090}
.cat-personal{background:#ece6f8;color:#6050a0}
.cat-other{background:#e4ecf8;color:#506080}
.ev-meta{font-size:11px;color:var(--text3);margin-top:3px}
.ev-actions{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ics-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:2px;opacity:.55}
.ics-btn:hover{opacity:1}

/* Notes */
.notes-toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.note-new-btn{background:linear-gradient(135deg,#c4daf0,#7ab0e0);border:none;border-radius:12px;padding:8px 16px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(122,176,224,0.3);white-space:nowrap}
.note-search{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
.note-search:focus{border-color:var(--blue-mid)}
.note-search::placeholder{color:var(--text3)}
.note-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer}
.note-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.note-card-title{font-size:13.5px;font-weight:600;margin-bottom:4px}
.note-card-preview{font-size:12px;color:var(--text3);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-card-meta{font-size:10.5px;color:var(--text3);margin-top:6px}
.note-list-wrap{display:flex;flex-direction:column;flex:1}
.note-list-wrap.hidden{display:none}
.note-editor{display:none;flex-direction:column;flex:1}
.note-editor.open{display:flex}
.editor-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);padding:0;line-height:1}
.note-title-inp{flex:1;background:transparent;border:none;border-bottom:1.5px solid var(--border);padding:6px 0;font-size:16px;font-weight:700;color:var(--text);outline:none;font-family:inherit}
.note-title-inp::placeholder{color:var(--text3)}
.note-body-inp{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px;font-size:13.5px;color:var(--text);outline:none;font-family:inherit;resize:none;line-height:1.8;min-height:300px}
.note-body-inp:focus{border-color:var(--blue-mid)}
.note-body-inp::placeholder{color:var(--text3)}
.editor-actions{display:flex;gap:8px;margin-top:10px}
.save-btn{flex:1;padding:10px;border-radius:10px;background:linear-gradient(135deg,#c4daf0,#7ab0e0);border:none;color:var(--text);font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.discard-btn{padding:10px 18px;border-radius:10px;background:var(--surface);border:1.5px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit}
/* Trash */
.trash-toggle{background:none;border:none;font-size:13px;color:var(--text3);cursor:pointer;padding:4px 8px;border-radius:8px;font-family:inherit;display:flex;align-items:center;gap:4px}
.trash-toggle:hover{color:var(--red)}
.trash-badge{background:var(--red);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;font-weight:700}
.trash-section{background:#fff5f5;border:1.5px solid #f5d0d0;border-radius:14px;padding:12px 14px;margin-top:10px}
.trash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.trash-title{font-size:12px;font-weight:700;color:var(--red)}
.empty-trash-btn{background:none;border:1.5px solid #f5a0a0;border-radius:8px;padding:3px 10px;font-size:11px;color:var(--red);cursor:pointer;font-family:inherit}
.trash-card{display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:6px;background:#fff;border-radius:11px;border:1.5px solid #f5d0d0;opacity:.75}
.trash-card-body{flex:1;min-width:0}
.trash-card-title{font-size:13px;color:var(--text2);text-decoration:line-through}
.trash-card-date{font-size:10px;color:var(--text3);margin-top:2px}
.restore-btn{background:none;border:1.5px solid var(--blue-mid);border-radius:8px;padding:3px 8px;font-size:11px;color:var(--blue);cursor:pointer;font-family:inherit;white-space:nowrap}
.perm-del-btn{background:none;border:none;color:#e0a0a0;cursor:pointer;font-size:17px;padding:0 2px;line-height:1}

input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{opacity:.4;cursor:pointer}
</style>
</head>
<body>
<div class="bg-dots"></div>
<div class="app">
  <div class="header">
    <div class="avatar">🌸</div>
    <div>
      <div class="header-name">效率CC</div>
      <div class="header-date" id="hDate"></div>
    </div>
    <div class="chips">
      <div class="chip chip-t" id="cTodo">0 待辦</div>
      <div class="chip chip-e" id="cEv">0 今日</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="go('todos')">✅ 待辦</button>
    <button class="tab" onclick="go('cal')">📅 行程</button>
    <button class="tab" onclick="go('notes')">📝 筆記</button>
  </div>

  <div class="content">
    <!-- TODOS -->
    <div class="panel" id="p-todos">
      <!-- Uncat warning -->
      <div id="uncatBanner" class="uncat-banner" style="display:none">
        ⚠️ 你有 <strong id="uncatCount">0</strong> 個待辦還沒有分類，記得補上喔！
      </div>

      <!-- Add area -->
      <div class="todo-add-area">
        <div class="qadd">
          <input id="ti" placeholder="新增待辦事項..." onkeydown="if(event.key==='Enter')addTM()">
        </div>
        <div class="qadd-row2">
          <div class="cat-opts-inline">
            <button type="button" class="todo-cat-btn work" data-c="work" onclick="selTCat('work')">💼 Work</button>
            <button type="button" class="todo-cat-btn tjm" data-c="tjm" onclick="selTCat('tjm')">🏠 TJM</button>
            <button type="button" class="todo-cat-btn other" data-c="other" onclick="selTCat('other')">📌 Other</button>
            <button type="button" class="todo-cat-btn none sel" data-c="" onclick="selTCat('')">— 待定</button>
          </div>
        </div>
        <div class="qadd-row2" style="margin-top:8px">
          <div class="pri-sel">
            <button type="button" class="pri-btn high" data-p="high" onclick="selTPri('high')">🔴</button>
            <button type="button" class="pri-btn medium sel" data-p="medium" onclick="selTPri('medium')">🟡</button>
            <button type="button" class="pri-btn low" data-p="low" onclick="selTPri('low')">🟢</button>
          </div>
          <span style="font-size:11px;color:var(--text3);margin-left:6px" id="priLabel">中 優先</span>
        </div>
        <button class="add-todo-btn" onclick="addTM()">＋ 新增</button>
      </div>

      <!-- Filter -->
      <div class="todo-filters">
        <button class="tfilter active" onclick="setTFilter('all')">全部</button>
        <button class="tfilter" onclick="setTFilter('work')">💼 Work</button>
        <button class="tfilter" onclick="setTFilter('tjm')">🏠 TJM</button>
        <button class="tfilter" onclick="setTFilter('other')">📌 Other</button>
        <button class="tfilter" onclick="setTFilter('none')">— 待定</button>
      </div>

      <div id="tCon"></div>
    </div>

    <!-- CALENDAR -->
    <div class="panel" id="p-cal" style="display:none">
      <div class="ev-form" style="margin-top:4px">
        <div class="form-lbl">＋ 新增行程</div>
        <input class="finp" id="eTitle" placeholder="行程標題">
        <div class="frow">
          <input class="finp" type="date" id="eDate">
          <input class="finp ftime" type="time" id="eTime" value="09:00">
        </div>
        <input class="finp" id="eNote" placeholder="備註（選填）">
        <div class="form-sublbl">分類</div>
        <div class="cat-sel" id="catSel">
          <button type="button" class="cat-opt work selected" data-cat="work" onclick="selCat('work')">💼 Work</button>
          <button type="button" class="cat-opt personal" data-cat="personal" onclick="selCat('personal')">🏠 TJM</button>
          <button type="button" class="cat-opt other" data-cat="other" onclick="selCat('other')">📌 Other</button>
        </div>
        <div class="remind-row">
          <input type="checkbox" id="eRemind">
          <label for="eRemind">🔔 提前提醒</label>
          <select id="eRemindMin">
            <option value="10">10 分鐘前</option>
            <option value="30" selected>30 分鐘前</option>
            <option value="60">1 小時前</option>
            <option value="1440">1 天前</option>
          </select>
        </div>
        <button class="add-btn" onclick="addEM()">新增行程</button>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="filterCat('all')">全部</button>
        <button class="filter-btn" onclick="filterCat('work')">💼 Work</button>
        <button class="filter-btn" onclick="filterCat('personal')">🏠 TJM</button>
        <button class="filter-btn" onclick="filterCat('other')">📌 Other</button>
      </div>
      <div id="eCon"></div>
    </div>

    <!-- NOTES -->
    <div class="panel" id="p-notes" style="display:none">
      <div class="note-list-wrap" id="noteListWrap" style="margin-top:4px">
        <div class="notes-toolbar">
          <button class="note-new-btn" onclick="openEditor(null)">＋ 新增筆記</button>
          <input class="note-search" id="noteSearch" placeholder="搜尋筆記..." oninput="rNotes()">
          <button class="trash-toggle" onclick="toggleTrash()" id="trashToggle">🗑️ <span id="trashBadgeWrap"></span></button>
        </div>
        <div id="nCon"></div>
        <div id="trashSection" style="display:none">
          <div class="trash-section">
            <div class="trash-header">
              <div class="trash-title">🗑️ 垃圾桶</div>
              <button class="empty-trash-btn" onclick="emptyTrash()">全部清除</button>
            </div>
            <div id="trashCon"></div>
          </div>
        </div>
      </div>
      <div class="note-editor" id="noteEditor">
        <div class="editor-header">
          <button class="back-btn" onclick="closeEditor()">←</button>
          <input class="note-title-inp" id="nTitleInp" placeholder="標題">
        </div>
        <textarea class="note-body-inp" id="nBodyInp" placeholder="開始記錄...&#10;&#10;想到什麼就寫什麼 🌸"></textarea>
        <div class="editor-actions">
          <button class="save-btn" onclick="saveNote()">儲存</button>
          <button class="discard-btn" onclick="closeEditor()">取消</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const ST='cc_todos_v3',SE='cc_events_m',SN='cc_notes_m',STR='cc_trash_m';
const PC={high:'#e07880',medium:'#e8c060',low:'#88c0a4'};
const PL={high:'高',medium:'中',low:'低'};
const CAT_EV={work:'💼 Work',personal:'🏠 TJM',other:'📌 Other'};
const CAT_EV_CLS={work:'cat-work',personal:'cat-personal',other:'cat-other'};
const TCAT={work:'💼 Work',tjm:'🏠 TJM',other:'📌 Other','':'— 待定'};
const TCAT_BADGE={work:'badge-work',tjm:'badge-tjm',other:'badge-other','':'badge-none'};

let todos=[],events=[],notes=[],trash=[],selEvCat='work',filterEvCat='all';
let selTCatVal='',selTPriVal='medium',todoFilter='all',editingNoteId=null,showTrash=false;
try{todos=JSON.parse(localStorage.getItem(ST)||'[]')}catch{}
try{events=JSON.parse(localStorage.getItem(SE)||'[]')}catch{}
try{notes=JSON.parse(localStorage.getItem(SN)||'[]')}catch{}
try{trash=JSON.parse(localStorage.getItem(STR)||'[]')}catch{}

const today=new Date().toISOString().slice(0,10);
document.getElementById('eDate').value=today;
document.getElementById('hDate').textContent=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

function gid(id){return document.getElementById(id)}
function genId(){return Math.random().toString(36).slice(2,9)}
function saveAll(){
  localStorage.setItem(ST,JSON.stringify(todos));
  localStorage.setItem(SE,JSON.stringify(events));
  localStorage.setItem(SN,JSON.stringify(notes));
  localStorage.setItem(STR,JSON.stringify(trash));
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function timeAgo(ts){
  const d=Math.floor((Date.now()-ts)/86400000);
  if(d===0)return'今天';if(d===1)return'昨天';if(d<7)return d+'天前';
  return new Date(ts).toLocaleDateString('zh-TW',{month:'short',day:'numeric'});
}

if('Notification' in window && Notification.permission==='default') Notification.requestPermission();
function scheduleNotif(ev){
  if(!ev.remind||!ev.time||Notification.permission!=='granted')return;
  const delay=new Date(ev.date+'T'+ev.time).getTime()-ev.remindMin*60*1000-Date.now();
  if(delay>0&&delay<172800000){
    setTimeout(()=>{new Notification('效率CC 提醒 🌸',{body:`「${ev.title}」還有 ${ev.remindMin>=60?ev.remindMin/60+'小時':ev.remindMin+'分鐘'} 就要開始！`})},delay);
  }
}
function scheduleAll(){events.forEach(e=>scheduleNotif(e))}

function chips(){
  gid('cTodo').textContent=todos.filter(t=>!t.done).length+' 待辦';
  gid('cEv').textContent=events.filter(e=>e.date===today).length+' 今日';
}
function checkUncat(){
  const n=todos.filter(t=>!t.done&&t.cat==='').length;
  const b=gid('uncatBanner');
  if(n>0){b.style.display='flex';gid('uncatCount').textContent=n;}
  else{b.style.display='none';}
}

let cur='todos';
function go(t){
  cur=t;
  ['todos','cal','notes'].forEach((k,i)=>{
    gid('p-'+k).style.display=k===t?'flex':'none';
    document.querySelectorAll('.tab')[i].classList.toggle('active',k===t);
  });
  if(t==='todos'){rTodos();checkUncat();}
  if(t==='cal')rCal();
  if(t==='notes'){closeEditor(true);rNotes();}
}

// Todo cat/pri selectors
function selTCat(cat){
  selTCatVal=cat;
  document.querySelectorAll('.todo-cat-btn').forEach(b=>{b.classList.toggle('sel',b.dataset.c===cat)});
}
function selTPri(pri){
  selTPriVal=pri;
  document.querySelectorAll('.pri-btn').forEach(b=>{b.classList.toggle('sel',b.dataset.p===pri)});
  gid('priLabel').textContent=PL[pri]+' 優先';
}
function setTFilter(f){
  todoFilter=f;
  document.querySelectorAll('.tfilter').forEach(b=>{
    b.classList.toggle('active',b.getAttribute('onclick').includes("'"+f+"'"));
  });
  rTodos();
}

// TODOS
function addTM(){
  const inp=gid('ti');
  if(!inp.value.trim())return;
  todos.unshift({id:genId(),title:inp.value.trim(),priority:selTPriVal,cat:selTCatVal,done:false,created:Date.now()});
  inp.value='';saveAll();chips();checkUncat();rTodos();
}
function rTodos(){
  const c=gid('tCon');
  let pend=todos.filter(t=>!t.done);
  if(todoFilter!=='all') pend=pend.filter(t=>(todoFilter==='none'?t.cat==='':t.cat===todoFilter));
  const done=todos.filter(t=>t.done);
  if(!pend.length&&!done.length){c.innerHTML='<div class="empty">🎉 沒有待辦事項<br>太棒了！</div>';return}
  let h='';
  if(!pend.length)h+='<div class="empty" style="margin-bottom:12px">🎉 這個分類沒有待辦！</div>';

  const COLS=[{key:'work',label:'💼 Work',color:'#3a6090'},{key:'tjm',label:'🏠 TJM',color:'#6050a0'},{key:'other',label:'📌 Other',color:'#506080'}];

  ['high','medium','low'].forEach(p=>{
    const items=pend.filter(t=>t.priority===p);
    if(!items.length)return;
    const pri_icon=p==='high'?'🔴':p==='medium'?'🟡':'🟢';
    h+=`<div class="todo-section"><div class="todo-sec-hdr"><div class="todo-sec-title" style="color:${PC[p]}">${pri_icon} ${PL[p]} 優先</div><div class="todo-sec-count">${items.length}</div></div>`;

    if(todoFilter==='all'){
      h+='<div class="todo-col-grid">';
      COLS.forEach(col=>{
        const ci=items.filter(t=>t.cat===col.key);
        h+=`<div class="todo-col"><div class="todo-col-hdr" style="color:${col.color}">${col.label}</div>`;
        if(!ci.length){h+='<div class="todo-col-empty">—</div>';}
        else{ci.forEach(t=>{
          const d=Math.floor((Date.now()-t.created)/86400000);
          const od=d>=3?`<div class="overdue">⚠️ ${d}天</div>`:'';
          h+=`<div class="todo-card" style="border-top:2.5px solid ${PC[p]}"><div class="todo-card-top"><button class="todo-check" style="border-color:${PC[p]}" onclick="doneT('${t.id}')"></button><div class="todo-title">${esc(t.title)}</div><button class="todo-del" onclick="delT('${t.id}')">×</button></div><div class="todo-date">${new Date(t.created).toLocaleDateString('zh-TW',{month:'short',day:'numeric'})}${od?'&nbsp;'+od:''}</div></div>`;
        });}
        h+='</div>';
      });
      h+='</div>';
      const ni=items.filter(t=>t.cat==='');
      if(ni.length){
        ni.forEach(t=>{
          const d=Math.floor((Date.now()-t.created)/86400000);
          const od=d>=3?`<span class="overdue"> ⚠️ ${d}天</span>`:'';
          h+=`<div class="todo-card" style="flex-direction:row;align-items:center;gap:8px;border-left:3px solid #e8c060;margin-top:4px"><button class="todo-check" style="border-color:#e8c060;width:18px;height:18px;border-radius:6px;flex-shrink:0" onclick="doneT('${t.id}')"></button><div style="flex:1;min-width:0"><div class="todo-title">${esc(t.title)} <span class="badge badge-none">— 待定</span></div><div class="todo-date">${new Date(t.created).toLocaleDateString('zh-TW',{month:'short',day:'numeric'})}${od}</div></div><button class="todo-del" onclick="delT('${t.id}')">×</button></div>`;
        });
      }
    } else {
      items.forEach(t=>{
        const d=Math.floor((Date.now()-t.created)/86400000);
        const od=d>=3?`<span class="overdue"> ⚠️ ${d}天</span>`:'';
        h+=`<div class="todo-card" style="flex-direction:row;align-items:center;gap:8px;border-left:3px solid ${PC[p]}"><button class="todo-check" style="border-color:${PC[p]};width:18px;height:18px;border-radius:6px;flex-shrink:0" onclick="doneT('${t.id}')"></button><div style="flex:1;min-width:0"><div class="todo-title">${esc(t.title)}</div><div class="todo-date">${new Date(t.created).toLocaleDateString('zh-TW',{month:'short',day:'numeric'})}${od}</div></div><button class="todo-del" onclick="delT('${t.id}')">×</button></div>`;
      });
    }
    h+='</div>';
  });

  if(todoFilter==='all'&&done.length){
    h+=`<details class="done-sec"><summary>已完成 (${done.length})</summary>`;
    done.forEach(t=>{h+=`<div class="done-item"><span>✅</span><div class="done-title">${esc(t.title)}</div><button class="del-btn" onclick="delT('${t.id}')">×</button></div>`;});
    h+='</details>';
  }
  c.innerHTML=h;
}
function doneT(id){todos=todos.map(t=>t.id===id?{...t,done:true}:t);saveAll();chips();checkUncat();rTodos()}
function delT(id){todos=todos.filter(t=>t.id!==id);saveAll();chips();checkUncat();rTodos()}

// CALENDAR
function selCat(cat){
  selEvCat=cat;
  document.querySelectorAll('#catSel .cat-opt').forEach(b=>{b.classList.toggle('selected',b.dataset.cat===cat)});
}
function filterCat(cat){
  filterEvCat=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.classList.toggle('active',b.getAttribute('onclick').includes("'"+cat+"'"));
  });
  rCal();
}
function exportICS(ev){
  const d=ev.date.replace(/-/g,''),t=ev.time?ev.time.replace(':','')+'00':'000000';
  const ics=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//效率CC//EN\r\nBEGIN:VEVENT\r\nUID:${genId()}@cc\r\nDTSTAMP:${d}T${t}Z\r\nDTSTART:${d}T${t}\r\nSUMMARY:${ev.title}\r\nDESCRIPTION:${ev.note||''}\r\nEND:VEVENT\r\nEND:VCALENDAR`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));a.download=ev.title+'.ics';a.click();
}
function addEM(){
  const title=gid('eTitle').value.trim();
  if(!title)return;
  const ev={id:genId(),title,date:gid('eDate').value,time:gid('eTime').value,note:gid('eNote').value,category:selEvCat,remind:gid('eRemind').checked,remindMin:parseInt(gid('eRemindMin').value),created:Date.now()};
  events=[...events,ev].sort((a,b)=>a.date.localeCompare(b.date));
  scheduleNotif(ev);
  gid('eTitle').value='';gid('eNote').value='';gid('eRemind').checked=false;
  saveAll();chips();rCal();
}
function rCal(){
  const c=gid('eCon');
  let fl=filterEvCat==='all'?events:events.filter(e=>e.category===filterEvCat);
  if(!fl.length){c.innerHTML='<div class="empty">📅 還沒有任何行程</div>';return}
  const tE=fl.filter(e=>e.date===today),up=fl.filter(e=>e.date>today),past=fl.filter(e=>e.date<today);
  let h='';
  if(tE.length){h+=`<div class="sec-ttl" style="color:var(--blue)">📍 今天</div>`;tE.forEach(e=>{h+=eHTML(e,'today')});}
  if(up.length){h+=`<div class="sec-ttl" style="color:var(--lav);margin-top:${tE.length?12:0}px">🗓️ 近期行程</div>`;up.slice(0,20).forEach(e=>{h+=eHTML(e,'')});}
  if(past.length){h+=`<details style="margin-top:10px"><summary style="font-size:12px;color:var(--text3);cursor:pointer;padding:4px 0">過去行程 (${past.length})</summary>`;past.forEach(e=>{h+=eHTML(e,'past')});h+='</details>';}
  c.innerHTML=h;
}
function eHTML(ev,cls){
  const d=new Date(ev.date+'T00:00:00'),col=cls==='today'?'var(--blue)':'var(--lav)',cat=ev.category||'work';
  return`<div class="ev-card ${cls}">
    <div class="ev-date"><div class="ev-day" style="color:${col}">${d.getDate()}</div><div class="ev-wd">${d.toLocaleDateString('zh-TW',{weekday:'short'})}</div></div>
    <div class="ev-info">
      <div class="ev-title">${ev.remind?'🔔 ':''}${esc(ev.title)}</div>
      <span class="cat-tag ${CAT_EV_CLS[cat]}">${CAT_EV[cat]}</span>
      <div class="ev-meta">${d.toLocaleDateString('zh-TW',{month:'short',day:'numeric'})}${ev.time?' · '+ev.time:''}${ev.note?' · '+esc(ev.note):''}</div>
    </div>
    <div class="ev-actions">
      <button class="ics-btn" onclick='exportICS(${JSON.stringify(ev).replace(/'/g,"&#39;")})'>📆</button>
      <button class="del-btn" onclick="delE('${ev.id}')">×</button>
    </div>
  </div>`;
}
function delE(id){events=events.filter(e=>e.id!==id);saveAll();chips();rCal()}

// NOTES
function rNotes(){
  const c=gid('nCon'),q=gid('noteSearch').value.trim().toLowerCase();
  const fl=q?notes.filter(n=>(n.title+n.body).toLowerCase().includes(q)):notes;
  if(!fl.length){c.innerHTML=`<div class="empty">${q?'🔍 找不到相關筆記':'📝 還沒有任何筆記<br>點上方新增第一篇吧！'}</div>`;return}
  c.innerHTML=fl.map(n=>`
    <div class="note-card" id="nc-${n.id}" onclick="openEditor('${n.id}')">
      <div class="note-card-top">
        <div class="note-card-title">${esc(n.title||'（無標題）')}</div>
        <button class="del-btn" id="nd-${n.id}" type="button">×</button>
      </div>
      <div class="note-card-preview">${esc(n.body||'').replace(/\n/g,' ')||'空白筆記'}</div>
      <div class="note-card-meta">📅 ${new Date(n.created).toLocaleDateString("zh-TW",{year:"numeric",month:"short",day:"numeric"})} · 更新 ${timeAgo(n.updated)}</div>
    </div>`).join('');
  fl.forEach(n=>{
    const btn=document.getElementById('nd-'+n.id);
    if(btn)btn.addEventListener('click',function(e){e.stopPropagation();e.preventDefault();delNote(n.id);});
  });
}
function openEditor(id){
  editingNoteId=id;
  const n=id?notes.find(x=>x.id===id):null;
  gid('nTitleInp').value=n?n.title:'';gid('nBodyInp').value=n?n.body:'';
  gid('noteListWrap').classList.add('hidden');gid('noteEditor').classList.add('open');
  setTimeout(()=>gid(n&&n.body?'nBodyInp':'nTitleInp').focus(),50);
}
function closeEditor(silent){
  gid('noteEditor').classList.remove('open');gid('noteListWrap').classList.remove('hidden');
  if(!silent)rNotes();
}
function saveNote(){
  const title=gid('nTitleInp').value.trim(),body=gid('nBodyInp').value.trim();
  if(!title&&!body){closeEditor();return}
  if(editingNoteId){notes=notes.map(n=>n.id===editingNoteId?{...n,title,body,updated:Date.now()}:n);}
  else{notes.unshift({id:genId(),title,body,created:Date.now(),updated:Date.now()});}
  saveAll();closeEditor();
}
function delNote(id){
  if(!confirm('移到垃圾桶？'))return;
  const n=notes.find(x=>x.id===id);
  if(n){trash.unshift({...n,deletedAt:Date.now()});}
  notes=notes.filter(n=>n.id!==id);
  saveAll();rNotes();updateTrashBadge();
}
function toggleTrash(){
  showTrash=!showTrash;
  gid('trashSection').style.display=showTrash?'block':'none';
  if(showTrash)rTrash();
}
function updateTrashBadge(){
  const w=gid('trashBadgeWrap');
  w.innerHTML=trash.length>0?`<span class="trash-badge">${trash.length}</span>`:'';
}
function rTrash(){
  const c=gid('trashCon');
  if(!trash.length){c.innerHTML='<div style="text-align:center;color:var(--text3);font-size:12px;padding:12px 0">垃圾桶是空的</div>';return}
  c.innerHTML=trash.map(n=>`
    <div class="trash-card" id="tc-${n.id}">
      <div class="trash-card-body">
        <div class="trash-card-title">${esc(n.title||'（無標題）')}</div>
        <div class="trash-card-date">刪除於 ${timeAgo(n.deletedAt)}</div>
      </div>
      <button class="restore-btn" id="tr-${n.id}">還原</button>
      <button class="perm-del-btn" id="tp-${n.id}">×</button>
    </div>`).join('');
  trash.forEach(n=>{
    const rb=document.getElementById('tr-'+n.id);
    const pb=document.getElementById('tp-'+n.id);
    if(rb)rb.addEventListener('click',()=>restoreNote(n.id));
    if(pb)pb.addEventListener('click',()=>permDelNote(n.id));
  });
}
function restoreNote(id){
  const n=trash.find(x=>x.id===id);
  if(n){const{deletedAt,...rest}=n;notes.unshift(rest);}
  trash=trash.filter(x=>x.id!==id);
  saveAll();rNotes();rTrash();updateTrashBadge();
}
function permDelNote(id){
  if(!confirm('永久刪除？此動作無法復原。'))return;
  trash=trash.filter(x=>x.id!==id);
  saveAll();rTrash();updateTrashBadge();
}
function emptyTrash(){
  if(!confirm('清空垃圾桶？所有筆記將永久刪除。'))return;
  trash=[];saveAll();rTrash();updateTrashBadge();
}

chips();rTodos();checkUncat();scheduleAll();updateTrashBadge();
</script>
</body>
</html>

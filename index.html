<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>效率CC · 個人助理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display.swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fdf8f4;--surface:#fff;--surface2:#fef6ee;
  --border:#f0e4d8;--text:#3a2e28;--text2:#8a7060;--text3:#b8a898;
  --peach:#ff8a65;--peach-soft:#fce4d6;--peach-mid:#f4b89a;
  --mint:#4caf8a;--mint-soft:#d8f0e4;
  --sky:#5b9bd5;--sky-soft:#deeaf8;
  --sand:#f5e6d0;--red:#e86060;--amber:#e8a030;--green:#3da870;
  --r:16px;
}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:520px;min-height:100vh;display:flex;flex-direction:column;position:relative}
.bg-dots{position:fixed;top:0;left:50%;transform:translateX(-50%);width:520px;height:100vh;background-image:radial-gradient(circle,rgba(255,138,101,0.06) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0}

/* API Key Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(58,46,40,0.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border-radius:20px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,0.12)}
.modal-icon{font-size:36px;text-align:center;margin-bottom:12px}
.modal-title{font-size:17px;font-weight:700;text-align:center;color:var(--text);margin-bottom:6px}
.modal-sub{font-size:12.5px;color:var(--text3);text-align:center;line-height:1.6;margin-bottom:20px}
.modal-sub a{color:var(--peach);text-decoration:none}
.modal-inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--text);font-size:13px;outline:none;font-family:inherit;margin-bottom:12px;transition:border-color .2s}
.modal-inp:focus{border-color:var(--peach-mid)}
.modal-inp::placeholder{color:var(--text3)}
.modal-btn{width:100%;padding:12px;border-radius:12px;background:linear-gradient(135deg,#ffb89a,#ff8a65);border:none;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;box-shadow:0 3px 14px rgba(255,138,101,0.28);transition:opacity .2s}
.modal-btn:hover{opacity:.9}
.modal-note{font-size:11px;color:var(--text3);text-align:center;margin-top:10px;line-height:1.5}

/* Header */
.header{position:relative;z-index:1;padding:22px 20px 0;display:flex;align-items:center;gap:12px}
.avatar{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,#ffb89a,#ff8a65);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 14px rgba(255,138,101,0.28);flex-shrink:0;cursor:pointer;transition:opacity .2s}
.avatar:hover{opacity:.85}
.avatar[title]:hover::after{content:attr(title);position:absolute;top:60px;left:20px;background:var(--text);color:#fff;font-size:11px;padding:4px 10px;border-radius:8px;white-space:nowrap;z-index:10}
.header-name{font-weight:700;font-size:17px;color:var(--text)}
.header-date{font-size:11px;color:var(--text3);margin-top:2px}
.chips{margin-left:auto;display:flex;gap:7px}
.chip{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.chip-p{background:var(--peach-soft);color:var(--peach)}
.chip-m{background:var(--mint-soft);color:var(--mint)}

/* Tabs */
.tabs{position:relative;z-index:1;display:flex;margin:16px 20px 0;background:var(--sand);border-radius:14px;padding:4px;gap:3px}
.tab{flex:1;padding:9px 0;border:none;border-radius:11px;background:transparent;color:var(--text3);font-weight:500;font-size:12.5px;cursor:pointer;transition:all .22s;font-family:inherit}
.tab.active{background:var(--surface);color:var(--peach);font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.07)}

/* Content */
.content{position:relative;z-index:1;flex:1;overflow:hidden;display:flex;flex-direction:column;padding:14px 0 0}
.panel{flex:1;overflow-y:auto;padding:0 18px;display:flex;flex-direction:column}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:var(--peach-mid);border-radius:3px}

/* Chat */
.welcome{text-align:center;margin-top:32px}
.welcome .icon{font-size:44px;margin-bottom:10px}
.welcome .title{font-size:15px;font-weight:700;color:var(--peach)}
.welcome .sub{font-size:12.5px;color:var(--text3);margin-top:5px;line-height:1.6}
.suggestions{margin-top:18px;display:flex;flex-direction:column;gap:8px}
.sug-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:22px;padding:9px 16px;color:var(--text2);font-size:12.5px;cursor:pointer;font-family:inherit;text-align:left;transition:all .2s}
.sug-btn:hover{border-color:var(--peach-mid);color:var(--peach)}
.msgs{display:flex;flex-direction:column;gap:10px;padding-bottom:10px}
.mrow{display:flex}
.mrow.user{justify-content:flex-end}
.mbubble{max-width:78%;padding:10px 14px;font-size:13.5px;line-height:1.6;border-radius:18px}
.mbubble.user{background:linear-gradient(135deg,#ffb89a,#ff8a65);color:#fff;border-radius:18px 18px 5px 18px;box-shadow:0 2px 10px rgba(255,138,101,0.25)}
.mbubble.bot{background:var(--surface);border:1.5px solid var(--border);border-radius:18px 18px 18px 5px;color:var(--text)}
.mbubble.act{background:var(--mint-soft);border:1.5px solid rgba(76,175,138,0.25);color:var(--text)}
.mavatar{width:28px;height:28px;border-radius:10px;background:linear-gradient(135deg,#ffb89a,#ff8a65);display:flex;align-items:center;justify-content:center;font-size:13px;margin-right:8px;flex-shrink:0;margin-top:2px;box-shadow:0 2px 6px rgba(255,138,101,0.2)}
.dots{display:flex;gap:4px;padding:2px 0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--peach);animation:bop 1.1s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.18s}
.dot:nth-child(3){animation-delay:.36s}
@keyframes bop{0%,60%,100%{transform:translateY(0);opacity:.6}30%{transform:translateY(-7px);opacity:1}}

/* Input bar */
.input-bar{padding:12px 18px 20px;display:flex;gap:9px;background:rgba(253,248,244,0.92);backdrop-filter:blur(8px);border-top:1.5px solid var(--border)}
.chat-inp{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;color:var(--text);font-size:13.5px;outline:none;font-family:inherit;transition:border-color .2s}
.chat-inp:focus{border-color:var(--peach-mid)}
.chat-inp::placeholder{color:var(--text3)}
.send-btn{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#ffb89a,#ff8a65);border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;box-shadow:0 3px 12px rgba(255,138,101,0.3);transition:opacity .2s}
.send-btn:disabled{opacity:.4;cursor:default}

/* Todos */
.qadd{display:flex;gap:8px;margin-bottom:16px}
.qadd input,.qadd select{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
.qadd input{flex:1}
.qadd input::placeholder{color:var(--text3)}
.qadd select{width:78px}
.qadd select option{background:#fff;color:var(--text)}
.plus-btn{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#ffb89a,#ff8a65);border:none;color:#fff;font-size:20px;font-weight:700;cursor:pointer;flex-shrink:0;box-shadow:0 2px 8px rgba(255,138,101,0.25)}
.pri-sec{margin-bottom:14px}
.pri-lbl{font-size:11px;font-weight:700;margin-bottom:7px;letter-spacing:.8px}
.todo-card{display:flex;align-items:center;gap:10px;padding:11px 13px;margin-bottom:7px;background:var(--surface);border-radius:14px;border:1.5px solid var(--border);transition:all .2s}
.todo-check{width:22px;height:22px;border-radius:7px;border:2px solid;background:transparent;cursor:pointer;flex-shrink:0;transition:all .15s}
.todo-check:hover{transform:scale(1.1)}
.todo-title{flex:1;font-size:13.5px;color:var(--text)}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:19px;padding:0;line-height:1;transition:color .2s}
.del-btn:hover{color:var(--red)}
.done-sec summary{font-size:12px;color:var(--text3);cursor:pointer;padding:6px 0}
.done-item{display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:5px;background:var(--surface);border-radius:10px;opacity:.4}
.done-title{flex:1;font-size:13px;text-decoration:line-through;color:var(--text2)}
.empty{text-align:center;color:var(--text3);margin-top:32px;font-size:13px;line-height:2}

/* Calendar */
.ev-form{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:14px;margin-bottom:18px}
.form-lbl{font-size:11.5px;font-weight:700;color:var(--peach);letter-spacing:.8px;margin-bottom:10px}
.finp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit;margin-bottom:8px;transition:border-color .2s}
.finp:focus{border-color:var(--peach-mid)}
.finp::placeholder{color:var(--text3)}
.frow{display:flex;gap:8px;margin-bottom:8px}
.frow .finp{margin-bottom:0}
.ftime{width:90px;flex-shrink:0}
.add-btn{width:100%;padding:10px;border-radius:10px;background:linear-gradient(135deg,#ffb89a,#ff8a65);border:none;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;box-shadow:0 2px 10px rgba(255,138,101,0.22)}
.sec-ttl{font-size:11.5px;font-weight:700;margin-bottom:9px}
.ev-card{display:flex;gap:12px;padding:11px 13px;margin-bottom:8px;background:var(--surface);border-radius:14px;border:1.5px solid var(--border)}
.ev-card.today{background:var(--peach-soft);border-color:rgba(255,138,101,0.3)}
.ev-card.past{opacity:.4}
.ev-date{text-align:center;min-width:40px}
.ev-day{font-size:18px;font-weight:700;line-height:1}
.ev-wd{font-size:10px;color:var(--text3);margin-top:2px}
.ev-info{flex:1}
.ev-title{font-size:13.5px;font-weight:600;color:var(--text)}
.ev-meta{font-size:11px;color:var(--text3);margin-top:3px}
input[type=date]::-webkit-calendar-picker-indicator,input[type=time]::-webkit-calendar-picker-indicator{opacity:.4;cursor:pointer}

/* Key indicator */
.key-badge{position:fixed;bottom:80px;right:16px;z-index:50;background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--text3);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:all .2s}
.key-badge:hover{border-color:var(--peach-mid);color:var(--peach)}
.key-badge.has-key{color:var(--mint)}
</style>
</head>
<body>
<div class="bg-dots"></div>

<!-- API Key Modal -->
<div class="modal-overlay" id="keyModal">
  <div class="modal">
    <div class="modal-icon">🌸</div>
    <div class="modal-title">歡迎使用效率CC</div>
    <div class="modal-sub">請輸入你的 Anthropic API Key 以啟用 AI 對話功能。<br>Key 只存在你的瀏覽器，不會傳送到任何第三方。<br><a href="https://console.anthropic.com/account/keys" target="_blank">→ 取得 API Key</a></div>
    <input class="modal-inp" type="password" id="keyInp" placeholder="sk-ant-api03-...">
    <button class="modal-btn" onclick="saveKey()">開始使用 →</button>
    <div class="modal-note">⚠️ 請勿將此網頁分享給他人，以免 API Key 外洩</div>
  </div>
</div>

<div class="app">
  <div class="header">
    <div class="avatar" title="點擊重設 API Key" onclick="resetKey()">🌸</div>
    <div>
      <div class="header-name">效率CC · 個人助理</div>
      <div class="header-date" id="hDate"></div>
    </div>
    <div class="chips">
      <div class="chip chip-p" id="cTodo">0 待辦</div>
      <div class="chip chip-m" id="cEv">0 今日</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="go('chat')">💬 對話</button>
    <button class="tab" onclick="go('todos')">✅ 待辦</button>
    <button class="tab" onclick="go('cal')">📅 行程</button>
  </div>

  <div class="content">
    <!-- CHAT -->
    <div class="panel" id="p-chat">
      <div id="chatWelcome" class="welcome">
        <div class="icon">🌸</div>
        <div class="title">嗨！我是效率CC</div>
        <div class="sub">用自然語言管理你的待辦和行程<br>直接跟我說話就好 🍀</div>
        <div class="suggestions">
          <button class="sug-btn" onclick="fill('幫我新增明天下午3點開會的行程')">📅 幫我新增明天下午3點開會的行程</button>
          <button class="sug-btn" onclick="fill('新增高優先待辦：準備季報簡報')">🔴 新增高優先待辦：準備季報簡報</button>
          <button class="sug-btn" onclick="fill('今天有什麼行程和待辦？')">🔍 今天有什麼行程和待辦？</button>
          <button class="sug-btn" onclick="fill('幫我規劃今天的工作順序')">✨ 幫我規劃今天的工作順序</button>
        </div>
      </div>
      <div id="chatMsgs" class="msgs" style="display:none"></div>
    </div>

    <!-- TODOS -->
    <div class="panel" id="p-todos" style="display:none">
      <div class="qadd">
        <input id="ti" placeholder="新增待辦事項..." onkeydown="if(event.key==='Enter')addTM()">
        <select id="tp">
          <option value="high">🔴 高</option>
          <option value="medium" selected>🟡 中</option>
          <option value="low">🟢 低</option>
        </select>
        <button class="plus-btn" onclick="addTM()">＋</button>
      </div>
      <div id="tCon"></div>
    </div>

    <!-- CALENDAR -->
    <div class="panel" id="p-cal" style="display:none">
      <div class="ev-form">
        <div class="form-lbl">＋ 新增行程</div>
        <input class="finp" id="eTitle" placeholder="行程標題">
        <div class="frow">
          <input class="finp" type="date" id="eDate">
          <input class="finp ftime" type="time" id="eTime" value="09:00">
        </div>
        <input class="finp" id="eNote" placeholder="備註（選填）" style="margin-bottom:10px">
        <button class="add-btn" onclick="addEM()">新增行程</button>
      </div>
      <div id="eCon"></div>
    </div>
  </div>

  <div id="inputBar" class="input-bar">
    <input class="chat-inp" id="ci" placeholder="跟效率CC說話..." onkeydown="if(event.key==='Enter')send()">
    <button class="send-btn" id="sb" onclick="send()">➤</button>
  </div>
</div>

<div class="key-badge" id="keyBadge" onclick="resetKey()">🔑 更換 Key</div>

<script>
const ST='sho_todos',SE='sho_events',SC='sho_chat',SK='sho_apikey';
const PC={high:'#e86060',medium:'#e8a030',low:'#3da870'};
const PL={high:'🔴 高',medium:'🟡 中',low:'🟢 低'};
let todos=[],events=[],chat=[],apiKey='',loading=false;
try{todos=JSON.parse(localStorage.getItem(ST)||'[]')}catch{}
try{events=JSON.parse(localStorage.getItem(SE)||'[]')}catch{}
try{chat=JSON.parse(localStorage.getItem(SC)||'[]')}catch{}
apiKey=localStorage.getItem(SK)||'';

const today=new Date().toISOString().slice(0,10);
document.getElementById('eDate').value=today;
document.getElementById('hDate').textContent=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

function gid(id){return document.getElementById(id)}
function genId(){return Math.random().toString(36).slice(2,9)}
function save(){
  localStorage.setItem(ST,JSON.stringify(todos));
  localStorage.setItem(SE,JSON.stringify(events));
  localStorage.setItem(SC,JSON.stringify(chat));
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// API Key
function saveKey(){
  const k=gid('keyInp').value.trim();
  if(!k||!k.startsWith('sk-')){
    gid('keyInp').style.borderColor='#e86060';
    gid('keyInp').placeholder='格式不對，請確認 Key 以 sk- 開頭';
    return;
  }
  apiKey=k;
  localStorage.setItem(SK,k);
  gid('keyModal').style.display='none';
  gid('keyBadge').className='key-badge has-key';
  gid('keyBadge').textContent='🔑 已設定';
  chips();
  if(chat.length)rChat();
}
function resetKey(){
  if(!confirm('確定要重設 API Key 嗎？'))return;
  apiKey='';
  localStorage.removeItem(SK);
  gid('keyInp').value='';
  gid('keyModal').style.display='flex';
  gid('keyBadge').className='key-badge';
  gid('keyBadge').textContent='🔑 更換 Key';
}
// Init modal
if(apiKey){
  gid('keyModal').style.display='none';
  gid('keyBadge').className='key-badge has-key';
  gid('keyBadge').textContent='🔑 已設定';
}
gid('keyInp').addEventListener('keydown',e=>{if(e.key==='Enter')saveKey()});

function chips(){
  gid('cTodo').textContent=todos.filter(t=>!t.done).length+' 待辦';
  gid('cEv').textContent=events.filter(e=>e.date===today).length+' 今日';
}

let cur='chat';
function go(t){
  cur=t;
  ['chat','todos','cal'].forEach(k=>{
    gid('p-'+k).style.display=k===t?'flex':'none';
    document.querySelectorAll('.tab')[['chat','todos','cal'].indexOf(k)].classList.toggle('active',k===t);
  });
  gid('inputBar').style.display=t==='chat'?'flex':'none';
  if(t==='todos')rTodos();
  if(t==='cal')rCal();
  if(t==='chat')rChat();
}

// AI
const SYS=`你是專屬個人助理「效率CC」，個性是標準 J 人——計畫控、條理清晰、行動導向。

你的特質：
- 看到模糊的事項會主動追問細節（沒有截止日期？沒有時間？你會碎念要補上）
- 待辦很多時會主動建議優先順序或拆解步驟
- 喜歡幫用戶整理、歸納、排序
- 完成事情時給予鼓勵和成就感
- 說話親切但有效率，不廢話，偶爾會用 J 人口吻說「這個最好今天就排進去喔」「沒有 deadline 的計畫不算計畫」之類的話
- 看到行程沒填時間、待辦沒設優先級，會提醒補上

只回傳以下 JSON 格式，不要有其他文字：
新增待辦：{"action":"add_todo","title":"xxx","priority":"high|medium|low"}
完成待辦：{"action":"complete_todo","id":"xxx"}
刪除待辦：{"action":"delete_todo","id":"xxx"}
新增行程：{"action":"add_event","title":"xxx","date":"YYYY-MM-DD","time":"HH:MM","note":"xxx"}
刪除行程：{"action":"delete_event","id":"xxx"}
查詢或建議：{"action":"query","reply":"你的回覆"}
其他對話：{"action":"chat","reply":"你的回覆"}

今天日期：${new Date().toLocaleDateString('zh-TW')}
請用繁體中文回覆，語氣親切活潑。只回傳JSON。`;

async function callAI(msg){
  const ctx=`目前待辦：${JSON.stringify(todos.map(t=>({id:t.id,title:t.title,done:t.done,priority:t.priority})))}\n目前行程：${JSON.stringify(events.map(e=>({id:e.id,title:e.title,date:e.date,time:e.time})))}`;
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages:[{role:'user',content:ctx+'\n\n'+msg}]})
  });
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'API 錯誤')}
  const d=await r.json();
  const t=d.content?.find(b=>b.type==='text')?.text||'{}';
  try{return JSON.parse(t.replace(/```json|```/g,'').trim())}
  catch{return{action:'chat',reply:t}}
}

function proc(res){
  let fb='';
  if(res.action==='add_todo'){
    const t={id:genId(),title:res.title,priority:res.priority||'medium',done:false,created:Date.now()};
    todos.unshift(t);fb=`✅ 已新增：「${res.title}」（${PL[t.priority]} 優先）`;
  }else if(res.action==='complete_todo'){
    todos=todos.map(t=>t.id===res.id?{...t,done:true}:t);fb='✅ 已標記完成！';
  }else if(res.action==='delete_todo'){
    todos=todos.filter(t=>t.id!==res.id);fb='🗑️ 已刪除待辦';
  }else if(res.action==='add_event'){
    const e={id:genId(),title:res.title,date:res.date,time:res.time||'',note:res.note||'',created:Date.now()};
    events=[...events,e].sort((a,b)=>a.date.localeCompare(b.date));
    fb=`📅 已新增行程：「${res.title}」${res.date}${res.time?' '+res.time:''}`;
  }else if(res.action==='delete_event'){
    events=events.filter(e=>e.id!==res.id);fb='🗑️ 已刪除行程';
  }else{fb=res.reply||'好的！'}
  save();chips();addM('bot',fb,res.action!=='chat'&&res.action!=='query');
}

function addM(role,text,isAct){
  chat.push({id:genId(),role,text,isAct:!!isAct,ts:Date.now()});
  save();rChat();
}
function rChat(){
  const m=gid('chatMsgs'),w=gid('chatWelcome');
  if(!chat.length){m.style.display='none';w.style.display='block';return}
  w.style.display='none';m.style.display='flex';
  m.innerHTML=chat.map(c=>{
    if(c.role==='user')return`<div class="mrow user"><div class="mbubble user">${esc(c.text)}</div></div>`;
    return`<div class="mrow"><div class="mavatar">🌸</div><div class="mbubble ${c.isAct?'act':'bot'}">${esc(c.text)}</div></div>`;
  }).join('')+(loading?`<div class="mrow"><div class="mavatar">🌸</div><div class="mbubble bot"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`:'');
  const p=gid('p-chat');p.scrollTop=p.scrollHeight;
}
async function send(){
  const inp=gid('ci'),msg=inp.value.trim();
  if(!msg||loading)return;
  if(!apiKey){alert('請先設定 API Key');return}
  inp.value='';addM('user',msg,false);
  loading=true;gid('sb').disabled=true;rChat();
  try{const r=await callAI(msg);proc(r);}
  catch(e){addM('bot','⚠️ 錯誤：'+e.message,false);}
  loading=false;gid('sb').disabled=false;
}
function fill(t){gid('ci').value=t;gid('ci').focus()}

// TODOS
function addTM(){
  const inp=gid('ti'),pri=gid('tp').value;
  if(!inp.value.trim())return;
  todos.unshift({id:genId(),title:inp.value.trim(),priority:pri,done:false,created:Date.now()});
  inp.value='';save();chips();rTodos();
}
function rTodos(){
  const c=gid('tCon');
  const pend=todos.filter(t=>!t.done),done=todos.filter(t=>t.done);
  if(!pend.length&&!done.length){c.innerHTML='<div class="empty">🎉 沒有待辦事項<br>太棒了！</div>';return}
  let h='';
  if(!pend.length)h+='<div class="empty">🎉 全部完成了！</div>';
  ['high','medium','low'].forEach(p=>{
    const items=pend.filter(t=>t.priority===p);
    if(!items.length)return;
    h+=`<div class="pri-sec"><div class="pri-lbl" style="color:${PC[p]}">${PL[p]} 優先</div>`;
    items.forEach(t=>{
      h+=`<div class="todo-card" style="border-left:3px solid ${PC[p]}">
        <button class="todo-check" style="border-color:${PC[p]}" onclick="doneT('${t.id}')"></button>
        <div class="todo-title">${esc(t.title)}</div>
        <button class="del-btn" onclick="delT('${t.id}')">×</button>
      </div>`;
    });
    h+='</div>';
  });
  if(done.length){
    h+=`<details class="done-sec"><summary>已完成 (${done.length})</summary>`;
    done.forEach(t=>{h+=`<div class="done-item"><span>✅</span><div class="done-title">${esc(t.title)}</div><button class="del-btn" onclick="delT('${t.id}')">×</button></div>`;});
    h+='</details>';
  }
  c.innerHTML=h;
}
function doneT(id){todos=todos.map(t=>t.id===id?{...t,done:true}:t);save();chips();rTodos()}
function delT(id){todos=todos.filter(t=>t.id!==id);save();chips();rTodos()}

// CALENDAR
function addEM(){
  const title=gid('eTitle').value.trim();
  if(!title)return;
  events=[...events,{id:genId(),title,date:gid('eDate').value,time:gid('eTime').value,note:gid('eNote').value,created:Date.now()}].sort((a,b)=>a.date.localeCompare(b.date));
  gid('eTitle').value='';gid('eNote').value='';
  save();chips();rCal();
}
function rCal(){
  const c=gid('eCon');
  if(!events.length){c.innerHTML='<div class="empty">📅 還沒有任何行程</div>';return}
  const tEvs=events.filter(e=>e.date===today);
  const up=events.filter(e=>e.date>today);
  const past=events.filter(e=>e.date<today);
  let h='';
  if(tEvs.length){h+=`<div class="sec-ttl" style="color:var(--peach)">📍 今天</div>`;tEvs.forEach(e=>{h+=eHTML(e,'today')});}
  if(up.length){h+=`<div class="sec-ttl" style="color:var(--sky);margin-top:${tEvs.length?12:0}px">🗓️ 近期行程</div>`;up.slice(0,10).forEach(e=>{h+=eHTML(e,'')});}
  if(past.length){h+=`<details style="margin-top:10px"><summary style="font-size:12px;color:var(--text3);cursor:pointer;padding:4px 0">過去行程 (${past.length})</summary>`;past.forEach(e=>{h+=eHTML(e,'past')});h+='</details>';}
  c.innerHTML=h;
}
function eHTML(ev,cls){
  const d=new Date(ev.date+'T00:00:00');
  const wd=d.toLocaleDateString('zh-TW',{weekday:'short'});
  const md=d.toLocaleDateString('zh-TW',{month:'short',day:'numeric'});
  const col=cls==='today'?'var(--peach)':'var(--sky)';
  return`<div class="ev-card ${cls}">
    <div class="ev-date"><div class="ev-day" style="color:${col}">${d.getDate()}</div><div class="ev-wd">${wd}</div></div>
    <div class="ev-info"><div class="ev-title">${esc(ev.title)}</div><div class="ev-meta">${md}${ev.time?' · '+ev.time:''}${ev.note?' · '+esc(ev.note):''}</div></div>
    <button class="del-btn" onclick="delE('${ev.id}')">×</button>
  </div>`;
}
function delE(id){events=events.filter(e=>e.id!==id);save();chips();rCal()}

chips();
if(chat.length)rChat();
</script>
</body>
</html>
